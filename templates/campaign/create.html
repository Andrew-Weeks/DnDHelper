{% extends 'base.html' %}
{% block title %}New Campaign — DnD Helper{% endblock %}

{% block content %}
<div class="card" style="max-width:500px; margin:0 auto;">
    <h1>Create Campaign</h1>
    <form method="POST" action="{{ url_for('campaign.campaign_create') }}">
        <div class="form-group">
            <label for="name">Campaign Name</label>
            <input type="text" id="name" name="name" maxlength="120"
                   placeholder="e.g. Curse of Strahd" required autofocus>
        </div>
        <div style="display:flex; gap:0.75rem; margin-top:1rem;">
            <button type="submit" class="btn">Create Campaign</button>
            <a href="{{ url_for('campaign.campaign_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
