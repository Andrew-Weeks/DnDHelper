{% extends 'base.html' %}
{% block title %}Register — DnD Helper{% endblock %}

{% block content %}
<div class="card">
    <h1>Register</h1>
    <form method="POST" id="register-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" minlength="3" maxlength="80" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="6" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" onchange="toggleDmSecret(this.value)">
                <option value="player">Player</option>
                <option value="dm">Dungeon Master (DM)</option>
            </select>
        </div>
        <div class="form-group" id="dm-secret-group" style="display:none;">
            <label for="dm_secret">DM Secret Passphrase</label>
            <input type="password" id="dm_secret" name="dm_secret">
            <small>Required to register as a DM.</small>
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>
    <p class="form-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>

<script>
function toggleDmSecret(role) {
    document.getElementById('dm-secret-group').style.display = role === 'dm' ? 'block' : 'none';
}
</script>
{% endblock %}
